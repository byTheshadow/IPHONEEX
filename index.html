<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>IPHONEEX</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    <link rel="stylesheet" href="core/glass.css">
    <link rel="stylesheet" href="core/phone.css">
    <link rel="stylesheet" href="apps/settings/settings.css">
</head>
<body>
    <!-- Wallpaper Layer -->
    <div id="wallpaper-layer">
        <div id="wallpaper-default"></div>
        <img id="wallpaper-custom" class="hidden" alt="">
    </div><div id="phone-container">
        <!-- Status Bar -->
        <div id="status-bar">
            <div class="status-left">
                <span id="status-time">12:00</span>
            </div>
            <div class="status-center">
                <div class="status-notch"></div>
            </div>
            <div class="status-right">
                <svg class="status-icon" width="17" height="12" viewBox="0 0 17 12" fill="none">
                    <rect x="0" y="7" width="3" height="5" rx="0.5" fill="currentColor"/>
                    <rect x="4.5" y="4.5" width="3" height="7.5" rx="0.5" fill="currentColor"/>
                    <rect x="9" y="2" width="3" height="10" rx="0.5" fill="currentColor"/>
                    <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="currentColor" opacity="0.35"/>
                </svg>
                <svg class="status-icon" width="16" height="12" viewBox="0 0 16 12" fill="none">
                    <path d="M1.5 5C3.5 2.5 5.6 1.5 8 1.5S12.5 2.5 14.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M48C5.2 6.5 6.5 5.8 8 5.8S10.8 6.5 12 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11" r="1.2" fill="currentColor"/>
                </svg>
                <svg class="status-icon" width="25" height="12" viewBox="0 0 25 12" fill="none">
                    <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="currentColor" stroke-width="1"/>
                    <rect x="2" y="2" width="15" height="8" rx="1" fill="currentColor"/>
                    <rect x="22" y="3.5" width="2" height="5" rx="1" fill="currentColor" opacity="0.5"/>
                </svg>
            </div>
        </div>

        <!-- Desktop -->
        <div id="desktop-viewport">
            <div id="desktop-pages"></div>
            <div id="page-dots"></div>
        </div>

        <!-- Dock -->
        <div id="dock">
            <div id="dock-inner"></div>
        </div>

        <!-- App Layer -->
        <div id="app-layer" class="hidden">
            <div id="app-content"></div>
        </div>

        <!-- Modal Layer -->
        <div id="modal-layer" class="hidden"></div>

        <!-- Context Menu Layer -->
        <div id="context-menu-layer" class="hidden"></div>
    </div>

    <script src="core/store.js"></script>
    <script src="core/logger.js"></script>
    <script src="core/api.js"></script>
    <script src="core/scheduler.js"></script>
    <script src="core/router.js"></script>
    <script src="core/widget.js"></script>
    <script src="apps/settings/settings.js"></script>
    <script src="core/phone.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Phone.init();
        });
    </script>
</body>
</html>
