<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a1a">
    <title>IPHONEEX</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="core/glass.css">
    <link rel="stylesheet" href="core/phone.css">
    <link rel="stylesheet" href="apps/settings/settings.css">
</head>
<body>
    <div id="phone-container">
        <!-- Status Bar -->
        <div id="status-bar" class="glass-status">
            <div class="status-left">
                <span id="status-time">12:00</span>
            </div>
            <div class="status-center">
                <div class="status-notch"></div>
            </div>
            <div class="status-right">
                <span class="status-signal">
                    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="8" width="3" height="4" rx="0.5" fill="currentColor"/><rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="currentColor"/><rect x="9" y="2" width="3" height="10" rx="0.5" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="currentColor" opacity="0.3"/></svg>
                </span>
                <span class="status-wifi">
                    <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 10.5a1.5 1.5 0 1103 1.5 1.5 0 010-3z" fill="currentColor"/><path d="M4.5 8.5C5.5 7.2 6.7 6.5 8 6.5s2.5.7 3.5 2" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1.5 5.5C3.3 3.2 5.5 2 8 2s4.7 1.2 6.5 3.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                </span>
                <span class="status-battery">
                    <svg width="22" height="12" viewBox="0 0 22 12"><rect x="0" y="0" width="19" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="2" y="2" width="14" height="8" rx="1" fill="currentColor"/><rect x="20" y="3.5" width="2" height="5" rx="0.5" fill="currentColor"/></svg>
                </span>
            </div>
        </div>

        <!-- Desktop Pages Container -->
        <div id="desktop-viewport"><div id="desktop-pages">
                <!-- Pages will be generated by JS -->
            </div>
            <div id="page-dots"></div>
        </div>

        <!-- Dock -->
        <div id="dock" class="glass">
            <!-- Dock icons populated by JS -->
        </div>

        <!-- App View Layer -->
        <div id="app-layer" class="hidden">
            <div id="app-content"></div>
        </div>

        <!-- Modal Layer -->
        <div id="modal-layer" class="hidden"></div>

        <!-- Context Menu Layer -->
        <div id="context-menu-layer" class="hidden"></div>
    </div>

    <!-- Wallpaper Layer (behind everything) -->
    <div id="wallpaper-layer">
        <div id="wallpaper-default"></div>
        <img id="wallpaper-custom" class="hidden" alt="">
    </div>

    <!-- Scripts -->
    <script src="core/store.js"></script>
    <script src="core/logger.js"></script>
    <script src="core/api.js"></script>
    <script src="core/scheduler.js"></script>
    <script src="core/router.js"></script>
    <script src="core/phone.js"></script>
    <script src="core/widget.js"></script>
    <script src="apps/settings/settings.js"></script>
    <script>
        // Boot
        document.addEventListener('DOMContentLoaded', () => {
            Phone.init();
        });
    </script>
</body>
</html>
