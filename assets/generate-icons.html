<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>生成图标</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 40px; font-family: sans-serif; color: #fff; }
    canvas { border-radius: 20px; }
    p { font-size: 14px; color: #aaa; }
    a { color: #a8c5da; }
  </style>
</head>
<body>
  <h2>IPHONEEX 图标生成器</h2>
  <p>右键点击图片 → 「图片存储为」，分别保存为 <code>icon-192.png</code> 和 <code>icon-512.png</code></p>

  <canvas id="c192" width="192" height="192"></canvas>
  <p>↑ icon-192.png（右键保存）</p>

  <canvas id="c512" width="512" height="512"></canvas>
  <p>↑ icon-512.png（右键保存）</p>

  <script>
    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext('2d');
      const r = s * 0.22; // 圆角半径

      // 圆角矩形背景
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();

      // 渐变背景
      const grad = ctx.createLinearGradient(0, 0, s, s);
      grad.addColorStop(0, '#1a1a2e');
      grad.addColorStop(1, '#2a2a45');
      ctx.fillStyle = grad;
      ctx.fill();

      // 手机外壳
      const pw = s * 0.39, ph = s * 0.69;
      const px = (s - pw) / 2, py = (s - ph) / 2;
      const pr = s * 0.06;

      ctx.beginPath();
      ctx.roundRect(px, py, pw, ph, pr);
      ctx.fillStyle = '#2e2e50';
      ctx.fill();

      // 屏幕
      const sw2 = pw - s * 0.05, sh2 = ph - s * 0.1;
      const sx = px + s * 0.025, sy = py + s * 0.05;
      ctx.beginPath();
      ctx.roundRect(sx, sy, sw2, sh2, pr * 0.7);
      ctx.fillStyle = '#3d3d60';
      ctx.fill();

      // 刘海
      ctx.beginPath();
      ctx.roundRect(sx + sw2 * 0.25, sy, sw2 * 0.5, s * 0.04, s * 0.02);
      ctx.fillStyle = '#1a1a2e';
      ctx.fill();

      // 星星
      const stars = [
        [0.41, 0.39, 0.006], [0.51, 0.33, 0.004], [0.59, 0.41, 0.005],
        [0.47, 0.47, 0.003], [0.57, 0.49, 0.004], [0.43, 0.55, 0.003],
        [0.61, 0.33, 0.003],
      ];
      stars.forEach(([rx, ry, rr]) => {
        ctx.beginPath();
        ctx.arc(s * rx, s * ry, s * rr, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(232,224,208,0.7)';
        ctx.fill();
      });

      // 中心 emoji
      ctx.font = `${s * 0.22}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🌸', s / 2, s * 0.66);

      // Home 指示条
      ctx.beginPath();
      ctx.roundRect(s * 0.38, s * 0.76, s * 0.24, s * 0.012, s * 0.006);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fill();
    }

    drawIcon(document.getElementById('c192'));
    drawIcon(document.getElementById('c512'));
  </script>
</body>
</html>
